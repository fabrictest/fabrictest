---
name: treefmt
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write # zizmor: ignore[excessive-permissions]
jobs:
  format:
    name: Format changes
    runs-on: ubuntu-latest
    steps:
      - name: Install Lix
        run: |
          echo "TODO(ttlgcc): Install Lix"
        shell: bash
      - name: Install Cachix
        run: |
          echo "TODO(ttlgcc): Install Cachix"
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Format files
        id: format
        run: |
          echo "TODO(ttlgcc): Invoke treefmt once we're able to invoke nix fmt"
          {
            echo files'<<'FILES
            git diff --name-only
            echo FILES
          } >>"$GITHUB_OUTPUT"
        shell: bash
      - name: Commit changes
        if: ${{ steps.format.outputs.files }}
        uses: IAreKyleW00t/verified-bot-commit@1c7707882a8619579f3e109ba20917e1a0fae2ea # v1.0.10
        with:
          message: |
            style: format changes
          files: ${{ steps.format.outputs.files }}
