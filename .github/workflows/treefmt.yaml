---
name: treefmt
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  format:
    name: Format changes
    runs-on: ubuntu-latest
    permissions:
      contents: write # zizmor: ignore[excessive-permissions]
      workflows: write
    steps:
      - name: Install Lix
        uses: fabrictest/action-setup-lix@v0.13.0
        with:
          lix-on-tmpfs: true
      - name: Set up Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: ${{ vars.CACHIX_NAME }}
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Format files
        id: format
        run: |
          nix develop --command treefmt
          {
            echo files'<<'FILES
            git diff --name-only
            echo FILES
          } >>"$GITHUB_OUTPUT"
        shell: bash
      - name: Commit changes
        if: ${{ steps.format.outputs.files }}
        uses: IAreKyleW00t/verified-bot-commit@1c7707882a8619579f3e109ba20917e1a0fae2ea # v1.0.10
        with:
          message: |
            style: format changes
          files: ${{ steps.format.outputs.files }}
